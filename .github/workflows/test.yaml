name: Tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - LICENSE
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install apt dependencies
        run: |
          curl -fsSL https://www.mongodb.org/static/pgp/server-8.0.asc | sudo gpg -o /usr/share/keyrings/mongodb-server-8.0.gpg --dearmor
          echo "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-8.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/8.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-8.0.list
          sudo apt update
          sudo apt install -y libldap-2.5-0 libldap-dev libsasl2-dev libkrb5-dev gnupg curl mongodb-org

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: cache poetry install
        uses: actions/cache@v4
        with:
          path: ~/.local
          key: poetry-2.0.1-0

      - uses: snok/install-poetry@v1
        with:
          version: 2.0.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: cache deps
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: .venv
          key: pydeps-${{ hashFiles('**/poetry.lock') }}

      - run: poetry install --no-interaction --no-root
        if: steps.cache-deps.outputs.cache-hit != 'true'

      - run: poetry install --no-interaction

      - run: poetry run pytest

  # Live Slurm integration: stand up giovtorres/slurm-docker-cluster via
  # docker compose and run the CHEETO_SLURM_LIVE-gated tests against a real
  # sacctmgr (reached with `docker exec slurmctld ...`). This is the only job
  # that exercises the live SyncSlurm apply path; the unit suite in `test`
  # covers everything else with DumpSAcctMgr.
  slurm-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # Pinned for reproducibility; bump deliberately. The compose file lives
      # at this commit and expects an image named slurm-docker-cluster:<ver>.
      SLURM_DOCKER_REF: 978c3ded1f72c1855e528a56559a7a51142eb39c
      SLURM_VERSION: "25.11.4"
    steps:
      - name: Checkout cheeto
        uses: actions/checkout@v4

      - name: Install apt dependencies
        run: |
          curl -fsSL https://www.mongodb.org/static/pgp/server-8.0.asc | sudo gpg -o /usr/share/keyrings/mongodb-server-8.0.gpg --dearmor
          echo "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-8.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/8.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-8.0.list
          sudo apt update
          sudo apt install -y libldap-2.5-0 libldap-dev libsasl2-dev libkrb5-dev gnupg curl mongodb-org

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: snok/install-poetry@v1
        with:
          version: 2.0.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: cache deps
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: .venv
          key: pydeps-${{ hashFiles('**/poetry.lock') }}

      - run: poetry install --no-interaction --no-root
        if: steps.cache-deps.outputs.cache-hit != 'true'

      - run: poetry install --no-interaction

      - name: Checkout slurm-docker-cluster
        uses: actions/checkout@v4
        with:
          repository: giovtorres/slurm-docker-cluster
          ref: ${{ env.SLURM_DOCKER_REF }}
          path: slurm-docker-cluster

      - name: Start Slurm cluster
        working-directory: slurm-docker-cluster
        run: |
          echo "SLURM_VERSION=${SLURM_VERSION}" > .env
          # Pull the published image and tag it to the local name the compose
          # file expects — avoids a ~20min from-source build.
          docker pull giovtorres/slurm-docker-cluster:${SLURM_VERSION}
          docker tag giovtorres/slurm-docker-cluster:${SLURM_VERSION} slurm-docker-cluster:${SLURM_VERSION}
          docker compose up -d mysql slurmdbd slurmctld

      - name: Wait for cluster to be healthy and registered
        working-directory: slurm-docker-cluster
        run: |
          for svc in mysql slurmdbd slurmctld; do
            echo "Waiting for $svc to be healthy..."
            timeout 120 bash -c "until docker compose ps $svc | grep -q healthy; do sleep 3; done"
          done
          echo "Waiting for cluster 'linux' to auto-register with slurmdbd..."
          timeout 90 bash -c "until docker exec slurmctld sacctmgr -n list cluster | grep -q linux; do sleep 3; done"
          docker exec slurmctld sacctmgr -n list cluster

      - name: Run live Slurm integration tests
        env:
          CHEETO_SLURM_LIVE: "1"
        run: poetry run pytest cheeto/tests/test_beanie.py::TestSlurmLive -v

      - name: Dump Slurm logs on failure
        if: failure()
        working-directory: slurm-docker-cluster
        run: docker compose logs --no-color | tail -300

      - name: Tear down cluster
        if: always()
        working-directory: slurm-docker-cluster
        run: docker compose down -v
