ldap:
  default:
    servers:
    - test-server
    searchbase: dc=hpc,dc=ucdavis,dc=edu
    login_dn: cn=admin,dc=hpc,dc=ucdavis,dc=edu
    password: test-password
    user_base: ou=users,dc=hpc,dc=ucdavis,dc=edu
hippo:
  api_key: ''
  site_aliases:
    caesfarm: farm
  max_tries: 3
  base_url: https://hippo-test.azurewebsites.net
ucdiam:
  api_key: ''
  base_url: https://iet-ws.ucdavis.edu/api
mongo:
  default:
    uri: 127.0.0.1
    port: 28080
    tls: False
    user: ''
    password: ''
    database: hpccf
daemon:
  default:
    broker_url: amqp://guest:guest@127.0.0.1:5672//
    author: cheeto-daemon
    sites:
    - test-site
    tasks:
      hippo:
        schedule: 300
      iam_sync:
        schedule: 0 2 * * *
        concurrency: 2
      slurm_sync:
        schedule: 600
        max_deletions: 10
      sympa:
        schedule: 3600
        output_dir: /tmp/cheeto-test-sympa
      # ldap_sync and reap intentionally absent: disabled
api:
  default:
    host: 127.0.0.1
    port: 8810
    api_key: test-api-key
